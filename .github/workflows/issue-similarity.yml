name: Issue similarity check

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  similarity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions-cool/issues-similarity-analysis@v1
        with:
          filter-threshold: 0.7
          title-excludes: ""
          comment-title: "### Possibly related issues"
          comment-body: "- #${number} · ${title}"
          show-footer: false
